<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlog — 클립 편집</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div class="phone">

  <div class="nav-bar">
    <button class="back-btn" data-back="edit-home.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="nav-title">2026년 5월 15일</span>
    <button class="nav-action">미리보기</button>
  </div>

  <div class="content content--clips">

    <!-- Add clip -->
    <div class="add-row">
      <button class="add-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        갤러리
      </button>
      <button class="add-btn">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        촬영
      </button>
    </div>

    <div class="section-label">클립 목록 · 4개</div>

    <!-- Clip 1 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct1">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:08</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 01</div>
        <div class="clip-caption">오전 7:30</div>
        <span class="clip-type-badge time">⏱ 시간형</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Clip 2 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct2">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:12</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 02</div>
        <div class="clip-caption">출근길 버스에서 본 하늘</div>
        <span class="clip-type-badge narr">💬 나레이션</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Clip 3 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct3">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:06</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 03</div>
        <div class="clip-caption empty">자막 없음</div>
        <span class="clip-type-badge none">— 미설정</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Clip 4 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct4">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:15</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 04</div>
        <div class="clip-caption">오후 6:18</div>
        <span class="clip-type-badge time">⏱ 시간형</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Preview info -->
    <div class="preview-cta">
      <div class="preview-info">
        <div class="p-label">총 길이</div>
        <div class="p-val">0:41 · 9:16 릴스</div>
      </div>
      <button class="preview-btn">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        전체 재생
      </button>
    </div>

    <!-- Render -->
    <button class="render-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      mp4 렌더링 & 저장
    </button>

  </div>

  <div class="tab-bar">
    <div class="tab-item active">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="14" height="11" rx="2"/><path d="M16 7l5-3v12l-5-3"/></svg></div>
      편집
    </div>
    <div class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></div>
      캘린더
    </div>
    <div class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      몸무게
    </div>
  </div>

</div>
<script src="store.js"></script>
<script src="video-store.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
</script>
<script>
(async function() {
  var params = new URLSearchParams(location.search);
  var date = params.get('date') || Store.today();

  document.querySelector('.nav-title').textContent = Store.formatDate(date);

  var content = document.querySelector('.content--clips');
  var sectionLabel = content.querySelector('.section-label');

  function getClips() { return Store.get(date).clips || []; }
  function setClips(clips) { Store.set(date, { clips: clips }); }
  function fmt(sec) { return Math.floor(sec/60) + ':' + String(Math.round(sec)%60).padStart(2,'0'); }

  async function renderClips() {
    content.querySelectorAll('.clip-card').forEach(function(c) { c.remove(); });
    var clips = getClips();
    sectionLabel.textContent = '클립 목록 · ' + clips.length + '개';

    var emptyEl = content.querySelector('.clips-empty');
    if (!clips.length) {
      if (!emptyEl) {
        var em = document.createElement('div');
        em.className = 'clips-empty';
        em.textContent = '클립을 추가해보세요.';
        sectionLabel.insertAdjacentElement('afterend', em);
      }
    } else {
      if (emptyEl) emptyEl.remove();
    }

    var totalSec = 0;
    for (var i = 0; i < clips.length; i++) {
      var clip = clips[i];
      totalSec += clip.duration || 0;
      var tc = (i % 4) + 1;
      var capCls = clip.caption ? '' : ' empty';
      var badgeCls = clip.captionType === 'time' ? 'time' : clip.captionType === 'narr' ? 'narr' : 'none';
      var badgeTxt = clip.captionType === 'time' ? '⏱ 시간형' : clip.captionType === 'narr' ? '💬 나레이션' : '— 미설정';

      var card = document.createElement('div');
      card.className = 'clip-card';
      card.dataset.clipId = clip.id;
      card.innerHTML =
        '<div class="drag-handle"><span></span><span></span><span></span></div>' +
        '<div class="clip-thumb ct' + tc + '" style="position:relative;overflow:hidden;">' +
          '<div class="c-play"><div class="c-play-btn"></div></div>' +
          '<span class="c-dur">' + (clip.duration ? fmt(clip.duration) : '—') + '</span>' +
        '</div>' +
        '<div class="clip-info">' +
          '<div class="clip-order">CLIP ' + String(i+1).padStart(2,'0') + '</div>' +
          '<div class="clip-caption' + capCls + '">' + (clip.caption || '자막 없음') + '</div>' +
          '<span class="clip-type-badge ' + badgeCls + '">' + badgeTxt + '</span>' +
        '</div>' +
        '<button class="clip-del-btn" data-clip-id="' + clip.id + '">✕</button>' +
        '<svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

      var blob = await VideoStore.get(clip.id);
      if (blob) {
        var objUrl = URL.createObjectURL(blob);
        var vid = document.createElement('video');
        vid.src = objUrl; vid.muted = true; vid.preload = 'metadata'; vid.playsInline = true; vid.currentTime = 0.5;
        vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;pointer-events:none;';
        card.querySelector('.clip-thumb').insertBefore(vid, card.querySelector('.c-play'));
      }

      (function(clipId) {
        card.addEventListener('click', function(e) {
          if (e.target.closest('.clip-del-btn')) return;
          go('edit-caption.html?date=' + date + '&clipId=' + clipId);
        });
      })(clip.id);

      sectionLabel.insertAdjacentElement('afterend', card);
    }

    var pVal = content.querySelector('.p-val');
    if (pVal) pVal.textContent = fmt(totalSec) + ' · 9:16 릴스';
  }

  content.addEventListener('click', async function(e) {
    var btn = e.target.closest('.clip-del-btn');
    if (!btn) return;
    e.stopPropagation();
    var clipId = btn.dataset.clipId;
    await VideoStore.delete(clipId);
    setClips(getClips().filter(function(c) { return c.id !== clipId; }));
    renderClips();
  });

  async function addVideoBlob(blob) {
    var id = 'clip_' + Date.now();
    var tmpUrl = URL.createObjectURL(blob);
    var duration = await new Promise(function(resolve) {
      var v = document.createElement('video');
      v.src = tmpUrl; v.preload = 'metadata';
      v.onloadedmetadata = function() { URL.revokeObjectURL(tmpUrl); resolve(v.duration); };
      v.onerror = function() { URL.revokeObjectURL(tmpUrl); resolve(0); };
    });
    await VideoStore.save(id, blob);
    var clips = getClips();
    clips.push({ id: id, duration: Math.round(duration), captionType: 'none', caption: '' });
    setClips(clips);
    renderClips();
  }

  var fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'video/*'; fileInput.style.display = 'none';
  document.body.appendChild(fileInput);
  fileInput.addEventListener('change', async function() {
    if (fileInput.files[0]) { await addVideoBlob(fileInput.files[0]); fileInput.value = ''; }
  });

  var addBtns = content.querySelectorAll('.add-btn');
  if (addBtns[0]) addBtns[0].addEventListener('click', function() { fileInput.click(); });
  if (addBtns[1]) addBtns[1].addEventListener('click', startCamera);

  async function startCamera() {
    var modal = document.createElement('div');
    modal.className = 'camera-modal';
    modal.innerHTML =
      '<video class="cam-preview" autoplay muted playsinline></video>' +
      '<div class="cam-controls">' +
        '<div class="cam-timer">0:00</div>' +
        '<button class="cam-rec"></button>' +
        '<button class="cam-close">✕</button>' +
      '</div>';
    document.querySelector('.phone').appendChild(modal);

    var preview = modal.querySelector('.cam-preview');
    var recBtn = modal.querySelector('.cam-rec');
    var timerEl = modal.querySelector('.cam-timer');
    var stream, recorder, chunks = [], elapsed = 0, ticker, recording = false;

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 } }, audio: true
      });
      preview.srcObject = stream;
    } catch(err) {
      modal.remove();
      alert('카메라 권한이 필요합니다.\n설정에서 허용 후 다시 시도하세요.');
      return;
    }

    function stopAll() {
      if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
      clearInterval(ticker);
      modal.remove();
    }

    modal.querySelector('.cam-close').addEventListener('click', stopAll);

    recBtn.addEventListener('click', function() {
      if (!recording) {
        chunks = [];
        var mime = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'].find(function(m) {
          try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; }
        }) || '';
        recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
        recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = async function() {
          var blob = new Blob(chunks, { type: recorder.mimeType });
          await addVideoBlob(blob);
          stopAll();
        };
        recorder.start(200);
        recording = true;
        recBtn.classList.add('recording');
        elapsed = 0;
        ticker = setInterval(function() {
          elapsed++;
          timerEl.textContent = Math.floor(elapsed/60) + ':' + String(elapsed%60).padStart(2,'0');
        }, 1000);
      } else {
        recorder.stop();
        recording = false;
        recBtn.classList.remove('recording');
        clearInterval(ticker);
      }
    });
  }

  await renderClips();
})();
</script>
</body>
</html>
