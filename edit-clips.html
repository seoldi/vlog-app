<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlog — 클립 편집</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div class="phone">

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 17 12" width="17" height="12"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <svg viewBox="0 0 16 12" width="18" height="12"><circle cx="8" cy="10.5" r="1.5" fill="#1a1a1a"/><path d="M4.5 7.5C5.5 6.4 6.7 5.8 8 5.8s2.5.6 3.5 1.7" stroke-width="1.2" fill="none" stroke="#1a1a1a" stroke-linecap="round"/><path d="M1.5 4.8C3.2 3 5.5 2 8 2s4.8 1 6.5 2.8" stroke-width="1.2" fill="none" stroke="#1a1a1a" stroke-linecap="round"/></svg>
      <div class="battery-icon"><div class="battery-body"><div class="battery-fill"></div></div><div class="battery-nib"></div></div>
    </div>
  </div>

  <div class="nav-bar">
    <button class="back-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="nav-title">2026년 5월 15일</span>
    <button class="nav-action">미리보기</button>
  </div>

  <div class="content content--clips">

    <!-- Add clip -->
    <div class="add-row">
      <button class="add-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        갤러리
      </button>
      <button class="add-btn">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        촬영
      </button>
    </div>

    <div class="section-label">클립 목록 · 4개</div>

    <!-- Clip 1 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct1">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:08</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 01</div>
        <div class="clip-caption">오전 7:30</div>
        <span class="clip-type-badge time">⏱ 시간형</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Clip 2 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct2">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:12</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 02</div>
        <div class="clip-caption">출근길 버스에서 본 하늘</div>
        <span class="clip-type-badge narr">💬 나레이션</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Clip 3 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct3">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:06</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 03</div>
        <div class="clip-caption empty">자막 없음</div>
        <span class="clip-type-badge none">— 미설정</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Clip 4 -->
    <div class="clip-card">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="clip-thumb ct4">
        <div class="c-play"><div class="c-play-btn"></div></div>
        <span class="c-dur">0:15</span>
      </div>
      <div class="clip-info">
        <div class="clip-order">CLIP 04</div>
        <div class="clip-caption">오후 6:18</div>
        <span class="clip-type-badge time">⏱ 시간형</span>
      </div>
      <svg class="clip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Preview info -->
    <div class="preview-cta">
      <div class="preview-info">
        <div class="p-label">총 길이</div>
        <div class="p-val">0:41 · 9:16 릴스</div>
      </div>
      <button class="preview-btn">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        전체 재생
      </button>
    </div>

    <!-- Render -->
    <button class="render-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      mp4 렌더링 & 저장
    </button>

  </div>

  <div class="tab-bar">
    <div class="tab-item active">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="14" height="11" rx="2"/><path d="M16 7l5-3v12l-5-3"/></svg></div>
      편집
    </div>
    <div class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></div>
      캘린더
    </div>
    <div class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      몸무게
    </div>
  </div>

</div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
