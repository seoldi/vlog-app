<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlog — 편집</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div class="phone">

  <div class="edit-header">
    <div class="header-left">
      <h2>편집</h2>
      <div class="header-sub">총 8개 프로젝트</div>
    </div>
  </div>

  <div class="content--projects">

    <!-- Card 1: 편집중 -->
    <div class="project-card">
      <div class="thumb-strip">
        <div class="t-main t1">
          <div class="play-overlay"><div class="play-circle"></div></div>
          <span class="clip-count-badge">클립 4개</span>
        </div>
        <div class="t-side">
          <div class="t-sm t2"></div>
          <div class="t-sm t3"></div>
        </div>
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-date">2026년 5월 15일</div>
          <div class="card-day">오늘 · 토요일</div>
        </div>
        <span class="status-badge editing">편집 중</span>
      </div>
    </div>

    <!-- Card 2: 완성 -->
    <div class="project-card">
      <div class="thumb-strip">
        <div class="t-main t2">
          <div class="play-overlay"><div class="play-circle"></div></div>
          <span class="clip-count-badge">클립 3개</span>
        </div>
        <div class="t-side">
          <div class="t-sm t4"></div>
          <div class="t-sm t1"></div>
        </div>
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-date">2026년 5월 12일</div>
          <div class="card-day">화요일</div>
        </div>
        <span class="status-badge done">완성</span>
      </div>
    </div>

    <!-- Card 3: 완성 -->
    <div class="project-card">
      <div class="thumb-strip">
        <div class="t-main t3">
          <div class="play-overlay"><div class="play-circle"></div></div>
          <span class="clip-count-badge">클립 5개</span>
        </div>
        <div class="t-side">
          <div class="t-sm t5"></div>
          <div class="t-sm t6"></div>
        </div>
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-date">2026년 5월 9일</div>
          <div class="card-day">토요일</div>
        </div>
        <span class="status-badge done">완성</span>
      </div>
    </div>

    <!-- Card 4: 완성 -->
    <div class="project-card">
      <div class="thumb-strip">
        <div class="t-main t4">
          <div class="play-overlay"><div class="play-circle"></div></div>
          <span class="clip-count-badge">클립 2개</span>
        </div>
        <div class="t-side">
          <div class="t-sm t1"></div>
          <div class="t-sm t2"></div>
        </div>
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-date">2026년 5월 7일</div>
          <div class="card-day">수요일</div>
        </div>
        <span class="status-badge done">완성</span>
      </div>
    </div>

  </div>

  <!-- FAB -->
  <button class="fab">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div class="tab-bar">
    <div class="tab-item active">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="14" height="11" rx="2"/><path d="M16 7l5-3v12l-5-3"/></svg></div>
      편집
    </div>
    <div class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></div>
      캘린더
    </div>
    <div class="tab-item">
      <div class="tab-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      몸무게
    </div>
  </div>

</div>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
</script>
</body>
</html>
