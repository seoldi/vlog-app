<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlog — 날짜 상세</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="phone">

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="back-btn" data-back="calendar.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-title">2026년 5월 12일</span>
    <div class="nav-right"></div>
  </div>

  <!-- Content -->
  <div class="content content--padded">

    <!-- Video Player -->
    <div class="video-wrap">
      <div class="video-bg">
        <div class="video-overlay">
          <div class="video-meta">
            <span class="video-time">오전 7:30</span>
            <span class="video-loc">이태원</span>
          </div>
          <button class="play-btn"></button>
          <div class="video-progress">
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
            <div class="progress-times">
              <span>0:11</span>
              <span>0:32</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Thumbnail Selector -->
    <div class="section-card">
      <div class="section-label">대표 썸네일</div>
      <div class="thumb-row">
        <div class="thumb-swatch s1 active"></div>
        <div class="thumb-swatch s2"></div>
        <div class="thumb-swatch s3"></div>
        <div class="thumb-swatch s4"></div>
        <div class="thumb-swatch s5"><span class="plus">+</span></div>
      </div>
    </div>

    <!-- Weight -->
    <div class="section-card">
      <div class="section-label">몸무게</div>
      <div class="weight-row">
        <div class="weight-left">
          <div class="weight-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 3a3 3 0 100 6 3 3 0 000-6z"/>
              <path d="M6 8h12l1.5 13H4.5L6 8z"/>
            </svg>
          </div>
          <div class="weight-input-wrap">
            <input class="weight-val" type="number" value="58.4" step="0.1" min="30" max="150">
            <span class="weight-unit">kg</span>
          </div>
        </div>
        <div class="weight-diff down">
          <span>▼</span>
          <span>0.3 kg</span>
        </div>
      </div>
    </div>

    <!-- Exercise -->
    <div class="section-card">
      <div class="section-label">운동</div>
      <div class="exercise-list">

        <div class="exercise-item">
          <div class="ex-type-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="5" r="1.5"/>
              <path d="M6 9l3 1 2 5 2-3 3 3"/>
              <path d="M9 10l-2 4"/>
              <path d="M15 10l2 4"/>
            </svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">러닝</div>
            <div class="ex-detail">오전 6:30 출발</div>
          </div>
          <div class="ex-stats">
            <div class="ex-stat-item">
              <span class="ex-stat-val">4.8</span>
              <span class="ex-stat-unit">km</span>
            </div>
            <div class="ex-stat-item">
              <span class="ex-stat-val">30</span>
              <span class="ex-stat-unit">min</span>
            </div>
            <div class="ex-stat-item">
              <span class="ex-stat-val">312</span>
              <span class="ex-stat-unit">kcal</span>
            </div>
          </div>
        </div>

      </div>
      <button class="ex-add-btn">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        운동 추가
      </button>
    </div>

    <!-- Diary -->
    <div class="section-card">
      <div class="section-label">다이어리</div>
      <div class="diary-inner">
        <div class="diary-header">
          <span class="diary-date-txt">2026. 05. 12.</span>
          <span class="diary-day">화요일</span>
        </div>
        <div class="diary-lines">
          <textarea class="diary-textarea" placeholder="오늘 하루를 기록해보세요.">오늘 아침 일찍 일어나서 루틴 완료.
점심은 혼자 파스타 해먹었다.</textarea>
        </div>
      </div>
    </div>

    <!-- Bottom CTA -->
    <div class="bottom-cta">
      <button class="btn-secondary">
        <svg viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        영상 편집
      </button>
      <button class="btn-primary">
        <svg viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        mp4 저장
      </button>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="3" width="14" height="11" rx="2"/>
          <path d="M16 7l5-3v12l-5-3"/>
        </svg>
      </div>
      편집
    </div>
    <div class="tab-item active">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
        </svg>
      </div>
      캘린더
    </div>
    <div class="tab-item">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      몸무게
    </div>
  </div>

</div>

<script src="store.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
</script>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var date = params.get('date') || Store.today();

  document.querySelector('.nav-title').textContent = Store.formatDate(date);
  document.querySelector('.diary-date-txt').textContent = date.replace(/-/g, '. ') + '.';
  document.querySelector('.diary-day').textContent = Store.dayName(date) + '요일';

  var weightInput = document.querySelector('.weight-val');
  var data = Store.get(date);
  weightInput.value = data.weight != null ? data.weight : '';

  function updateWeightDiff() {
    var all = Store.getAll();
    var cur = parseFloat(weightInput.value);
    var diffEl = document.querySelector('.weight-diff');
    if (!cur) { diffEl.innerHTML = ''; return; }
    var prev = Object.entries(all)
      .filter(function(e) { return e[0] < date && e[1].weight != null; })
      .sort(function(a, b) { return b[0].localeCompare(a[0]); })[0];
    if (prev) {
      var diff = (cur - prev[1].weight).toFixed(1);
      diffEl.className = 'weight-diff ' + (diff > 0 ? 'up' : 'down');
      diffEl.innerHTML = '<span>' + (diff > 0 ? '▲' : '▼') + '</span><span>' + Math.abs(diff) + ' kg</span>';
    } else {
      diffEl.innerHTML = '';
    }
  }

  weightInput.addEventListener('change', function() {
    var w = parseFloat(weightInput.value);
    Store.set(date, { weight: isNaN(w) ? null : w });
    updateWeightDiff();
  });
  updateWeightDiff();

  var diaryArea = document.querySelector('.diary-textarea');
  diaryArea.value = data.diary || '';
  diaryArea.addEventListener('input', function() { Store.set(date, { diary: diaryArea.value }); });

  var ICONS = {
    running: '<svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><path d="M6 9l3 1 2 5 2-3 3 3"/><path d="M9 10l-2 4"/><path d="M15 10l2 4"/></svg>',
    walking: '<svg viewBox="0 0 24 24"><circle cx="12" cy="4" r="1.5"/><path d="M9 8l3 2 3-2"/><path d="M12 10v5"/><path d="M9 21l3-6 3 6"/></svg>'
  };

  function renderExercises() {
    var exercises = Store.get(date).exercises || [];
    var list = document.querySelector('.exercise-list');
    if (!exercises.length) { list.innerHTML = ''; return; }
    list.innerHTML = exercises.map(function(ex, i) {
      var nm = ex.type === 'running' ? '러닝' : '걷기';
      return '<div class="exercise-item"><div class="ex-type-icon">' + (ICONS[ex.type] || ICONS.walking) + '</div><div class="ex-info"><div class="ex-name">' + nm + '</div></div><div class="ex-stats">' +
        (ex.distance ? '<div class="ex-stat-item"><span class="ex-stat-val">' + ex.distance + '</span><span class="ex-stat-unit">km</span></div>' : '') +
        (ex.duration ? '<div class="ex-stat-item"><span class="ex-stat-val">' + ex.duration + '</span><span class="ex-stat-unit">min</span></div>' : '') +
        '</div><button onclick="window._delEx(' + i + ')" style="background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:0 8px;line-height:1;flex-shrink:0;">×</button></div>';
    }).join('');
  }

  window._delEx = function(idx) {
    var exs = Store.get(date).exercises || [];
    exs.splice(idx, 1);
    Store.set(date, { exercises: exs });
    renderExercises();
  };

  renderExercises();

  document.querySelector('.ex-add-btn').addEventListener('click', function() {
    if (document.querySelector('.ex-form')) return;
    var form = document.createElement('div');
    form.className = 'ex-form';
    form.innerHTML =
      '<div class="ex-form-row">' +
        '<select class="ef-type"><option value="walking">걷기</option><option value="running">러닝</option></select>' +
        '<input class="ef-dur" type="number" placeholder="분" min="1" max="300">' +
        '<input class="ef-dist" type="number" placeholder="km" step="0.1" min="0">' +
      '</div>' +
      '<div class="ex-form-row">' +
        '<button class="ef-cancel">취소</button>' +
        '<button class="ef-save">추가</button>' +
      '</div>';
    this.insertAdjacentElement('beforebegin', form);
    form.querySelector('.ef-cancel').onclick = function() { form.remove(); };
    form.querySelector('.ef-save').onclick = function() {
      var type = form.querySelector('.ef-type').value;
      var duration = parseInt(form.querySelector('.ef-dur').value) || 0;
      var distance = parseFloat(form.querySelector('.ef-dist').value) || 0;
      var exs = Store.get(date).exercises || [];
      exs.push({ type: type, duration: duration, distance: distance });
      Store.set(date, { exercises: exs });
      form.remove();
      renderExercises();
    };
  });
})();
</script>
</body>
</html>
